version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      crypto:
        patterns:
          - '@bitcoinerlab/*'
          - bip32
          - bip39
          - bitcoinjs-lib
          - bech32
          - ecpair
          - ethers
        update-types:
          - patch
          - minor
      types:
        patterns:
          - '@types/*'
        update-types:
          - patch
          - minor
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
